# kube-prometheus-stack Helm values for Argus
# Install: helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#            --namespace monitoring --values observability/prometheus/values.yaml

prometheus:
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s
    additionalScrapeConfigs:
      - job_name: 'falco'
        static_configs:
          - targets: ['falco-service.kube-system.svc.cluster.local:8765']
        metrics_path: /metrics
        scrape_interval: 15s

grafana:
  adminPassword: argus-admin
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
