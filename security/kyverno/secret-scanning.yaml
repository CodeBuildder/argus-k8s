apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: detect-secrets-in-env
  annotations:
    policies.kyverno.io/title: Detect Secrets in Environment Variables
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Detects potential secrets in environment variables by pattern matching.
      Blocks pods with suspicious env var names or values that look like secrets.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-env-var-names
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Environment variable name suggests it contains a secret. Use Kubernetes Secrets instead."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].env[].name }}"
                operator: AnyIn
                value:
                  - "*PASSWORD*"
                  - "*SECRET*"
                  - "*TOKEN*"
                  - "*API_KEY*"
                  - "*APIKEY*"
                  - "*ACCESS_KEY*"
                  - "*PRIVATE_KEY*"
                  - "*CREDENTIALS*"
                  - "*AUTH*"
    
    - name: check-env-var-values
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Environment variable value appears to contain a hardcoded secret."
        deny:
          conditions:
            any:
              # AWS Access Key pattern
              - key: "{{ request.object.spec.containers[].env[].value }}"
                operator: AnyIn
                value:
                  - "AKIA*"
              # Generic base64 pattern (long strings)
              - key: "{{ length(request.object.spec.containers[].env[].value) }}"
                operator: GreaterThan
                value: 64
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: detect-secrets-in-configmaps
  annotations:
    policies.kyverno.io/title: Detect Secrets in ConfigMaps
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: ConfigMap
    policies.kyverno.io/description: >-
      Detects potential secrets stored in ConfigMaps.
      ConfigMaps should not contain sensitive data.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-configmap-keys
      match:
        any:
        - resources:
            kinds:
              - ConfigMap
      validate:
        message: "ConfigMap key name suggests it contains a secret. Use Kubernetes Secrets instead."
        deny:
          conditions:
            any:
              - key: "{{ keys(request.object.data) }}"
                operator: AnyIn
                value:
                  - "*password*"
                  - "*secret*"
                  - "*token*"
                  - "*api-key*"
                  - "*apikey*"
                  - "*private-key*"
                  - "*credentials*"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-secret-encryption
  annotations:
    policies.kyverno.io/title: Require Secret Encryption at Rest
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Secret
    policies.kyverno.io/description: >-
      Ensures all Secrets have proper labels indicating encryption status.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-secret-labels
      match:
        any:
        - resources:
            kinds:
              - Secret
      validate:
        message: "Secrets must have 'encrypted: true' label to indicate encryption at rest is enabled."
        pattern:
          metadata:
            labels:
              encrypted: "true"
