# Falco Helm values for Argus
# Install: helm upgrade --install falco falcosecurity/falco \
#            --namespace kube-system --values security/falco/values.yaml

driver:
  kind: modern_ebpf

falco:
  json_output: true
  log_stderr: true
  priority: warning

  http_output:
    enabled: true
    url: "http://argus-agent.argus-system.svc.cluster.local/falco/webhook"
    user_agent: "falcosecurity/falco"

  grpc:
    enabled: false

falcoctl:
  artifact:
    install:
      enabled: true
    follow:
      enabled: true
