name: Kyverno Policy Tests

on:
  push:
    paths:
      - 'security/kyverno/**'
  pull_request:
    paths:
      - 'security/kyverno/**'

jobs:
  kyverno-test:
    name: Test Kyverno Policies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.0/kyverno-cli_v1.12.0_linux_arm64.tar.gz
          tar -xzf kyverno-cli_v1.12.0_linux_arm64.tar.gz
          chmod +x kyverno
          sudo mv kyverno /usr/local/bin/kyverno
          kyverno version

      - name: Run Kyverno policy tests
        run: |
          echo "==> Running Kyverno policy tests..."
          kyverno test security/kyverno/
          echo "==> All policy tests passed."

      - name: Validate policy YAML syntax
        run: |
          echo "==> Validating policy YAML syntax..."
          for f in security/kyverno/*.yaml; do
            echo "Checking $f"
            kyverno validate "$f" || exit 1
          done
          echo "==> All policies are valid."
