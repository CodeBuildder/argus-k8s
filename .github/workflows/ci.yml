name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-yaml:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint all YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" \
            security/ cluster/ observability/ || true

  lint-python:
    name: Lint Python agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint agent source
        run: |
          ruff check agent/src/ || true

  validate-manifests:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Dry-run validate cluster manifests
        run: |
          kubectl apply --dry-run=client -f cluster/namespaces/namespaces.yaml || true
